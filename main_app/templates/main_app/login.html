{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>C.M.S | Log In</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <!-- Ionicons -->
    <link rel="stylesheet" href="{% static 'https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css' %}">
    <!-- icheck bootstrap -->
    <link rel="stylesheet" href="{% static 'plugins/icheck-bootstrap/icheck-bootstrap.min.css' %}">
    <!-- Theme style -->
    <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}">
    <!-- Google Font: Source Sans Pro -->
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700" rel="stylesheet">
    <!-- Google Recaptcha     -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="hold-transition login-page">
    <div class="login-box">
        <div class="login-logo">
    <div class="logo-icon">
        <i class="fas fa-graduation-cap"></i>
    </div>
    <h2>SmartSchool</h2>
    <p>Monitoring System</p>
    </div>
        <!-- /.login-logo -->
        <div class="card">
            <div class="card-body login-card-body">
                <!-- <p class="login-box-msg">Sign in to start your session</p> -->
                {% if messages %}
                <div class="col-12">
                    {% for message in messages %}
                    {% if message.tags == 'error' %}
                    <div class="alert alert-danger text-center ">
                        {{message }}
                    </div>
                    {% endif %}
                    {% endfor %}
                </div>
                {% endif %}
                <form action="doLogin/" method="post">
                    {% csrf_token %}
                    <div class="input-group mb-3">
                        <input required type="email" name='email' class="form-control" placeholder="Email">
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-envelope"></span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input required type="password" name='password' class="form-control" placeholder="Password">
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-lock"></span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <div class="g-recaptcha" data-sitekey="6LfswtgZAAAAAJ7bhwqZZtDpBsc75ekH6FWA4Fnt"></div>

                    </div>
                    <div class="row">
                        <div class="col-8">
                            <div class="icheck-primary">
                                <input type="checkbox" id="remember">
                                <label for="remember">
                                    Remember Me
                                </label>
                            </div>
                        </div>
                        <!-- /.col -->
                        <div class="col-4">
                            <button type="submit" class="btn btn-success btn-block">Log In</button>
                        </div>


                        <!-- /.col -->
                    </div>
                </form>


                <p class="mb-1">
                    <a href="{% url 'password_reset' %}">Forgot Password?</a>
                </p>

            </div>
            <!-- /.login-card-body -->
        </div>
    </div>
    <!-- /.login-box -->

    <!-- jQuery -->
    <script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
    <!-- Bootstrap 4 -->
    <script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <!-- AdminLTE App -->
    <script src="{% static 'dist/js/adminlte.min.js' %}"></script>
<style>

/* BACKGROUND */
body.login-page {
    background: #f4f6fb !important;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER (PLUS GRAND) */
.login-box {
    width: 100%;
    max-width: 460px;
    text-align: center;
}

/* LOGO */
.login-logo {
    margin-bottom: 25px;
}

.login-logo .logo-icon {
    width: 70px;
    height: 70px;
    background: #2563eb;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
}

.login-logo .logo-icon i {
    color: white;
    font-size: 28px;
}

.login-logo h2 {
    margin-top: 12px;
    font-size: 22px;
    font-weight: 600;
}

.login-logo p {
    font-size: 14px;
    color: #888;
    margin-top: -5px;
}

/* CARD (PLUS GRANDE) */
.card {
    border-radius: 18px;
    border: none;
    box-shadow: 0 12px 35px rgba(0,0,0,0.08);
}

.login-card-body {
    padding: 35px;
}

/* TITRE */
.login-card-body h4 {
    font-weight: 600;
    margin-bottom: 5px;
    font-size: 20px;
}

.login-card-body small {
    color: #888;
    font-size: 14px;
}

/* INPUT (PLUS GRANDS + MODERNES) */
.form-control {
    border-radius: 12px;
    height: 55px;
    font-size: 15px;
    padding-left: 15px;
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    transition: 0.3s;
}

/* EFFET FOCUS */
.form-control:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    background: #fff;
}

/* ICON INPUT */
.input-group-text {
    background: #f9fafb;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    height: 55px;
    font-size: 16px;
}

/* ESPACEMENT */
.input-group {
    margin-bottom: 18px;
}

/* BUTTON (PLUS GRAND + MODERNE) */
.btn-success {
    background: #2563eb !important;
    border: none;
    border-radius: 12px;
    height: 52px;
    font-size: 16px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-success:hover {
    background: #1e4fd6 !important;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
}

/* LINKS */
a {
    color: #2563eb;
    font-size: 13px;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* REMEMBER */
.icheck-primary label {
    font-size: 13px;
    color: #555;
}

/* FOOTER */
.login-footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}

</style>
</body>

</html>
