apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-web
  template:
    metadata:
      labels:
        app: django-web
    spec:
      containers:
        - name: django-web
          image: college-django:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              value: "True"
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_NAME
              value: "college_db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "root"
